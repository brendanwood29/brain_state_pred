num_epochs: 100
batch_size: 64
device: cuda:0
run_name: run_1
work_dir: work_dir
optim:
  name: adamw
  lr: 1e-4
loss:
  name: mse_loss
scheduler:
  name: cosine
  kwargs:
    max_lr: ${optim.lr}
    total_steps: 1000000
model: 
  name: mlp
  print_summary: true
  num_models_to_save: 5
  kwargs:
    in_size: 252
    out_size: 84 
    widths: 
      - 100
      - 100
      - 100
callbacks:
  use_early_stopping: true
  patience: 5
data:
  train:
    json_file: splits/train.json
    step: 3
  val:
    json_file: splits/val.json
    step: ${data.train.step}
    shuffle: false