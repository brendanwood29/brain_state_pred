num_epochs: 100
batch_size: 2048
device: cuda:0
run_name: run_1
work_dir: npi_result_more-data-transformerlr
seed: 42
batch_pbar: true
optim:
  name: adam
  lr: 1e-3
  kwargs:
    weight_decay: 5e-5
loss:
  name: mse_loss
# scheduler: null
scheduler:   
  name: cosine
  kwargs:
    max_lr: ${optim.lr}
    total_steps: 16100
    pct_start: 0.1
model: 
  # name: gcn
  # print_summary: true
  # num_models_to_save: 4
  # init: null
  # kwargs:
  #   num_features: 10
  #   hidden_dim: 512
  name: transformer
  print_summary: true
  num_models_to_save: 4
  init: null
  kwargs:
    in_features: 360
    num_heads: 12
    steps: 3
    num_blocks: 10
    # input_dim: 1080
    # hidden_dim: 720
    # latent_dim: 288
    # output_dim: 360
    # device: ${device}
callbacks:
  use_early_stopping: true
  patience: 5
data:
  train:
    data_path: splits/train.json
    step: ${model.kwargs.steps}
    shuffle: true
    # threshold: 0.1
  val:
    data_path: splits/val.json
    step: ${data.train.step}
    shuffle: false
    # threshold: 0.1