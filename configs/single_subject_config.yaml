  # unfreeze_modules:
  #   - lora
  #   - norm
  init: null
    # weights: npi_result_more-data-transformer/run_1/models/run_1_best_val_loss_0.1445.pt
    # weights_only: true
    # strict: false
  kwargs: 
    input_size: 360
    hidden_size: 128
    num_layers: 1
    steps: 15
